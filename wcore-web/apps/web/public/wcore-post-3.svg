    <text x="0" y="70" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="52" font-weight="850" fill="#f5f5f6" letter-spacing="-1.7">Earn from your own contract.</text>
    <text x="0" y="128" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="21" fill="#9ca3af">Deploy a GM contract, receive creator tips, and grow your</text>
    <text x="0" y="160" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="21" fill="#9ca3af">daily streak. Referrals add points when your network joins.</text>
  </g>

  <g transform="translate(80 386)">
    <rect x="0" y="0" width="320" height="106" rx="20" fill="#12141a" stroke="#262a34"/>
    <text x="24" y="38" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="30" font-weight="900" fill="#a3e635">8 chains</text>
    <text x="24" y="70" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="15" fill="#9ca3af">Base, Arbitrum, Optimism,</text>
    <text x="24" y="92" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="15" fill="#9ca3af">Polygon, BSC and more</text>
  </g>
  <g transform="translate(440 386)">
    <rect x="0" y="0" width="320" height="106" rx="20" fill="#12141a" stroke="#262a34"/>
    <text x="24" y="38" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="30" font-weight="900" fill="#a3e635">50% tips</text>
    <text x="24" y="70" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="15" fill="#9ca3af">Creators receive half of each</text>
    <text x="24" y="92" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="15" fill="#9ca3af">GM tip on their contract</text>
  </g>
  <g transform="translate(800 386)">
    <rect x="0" y="0" width="320" height="106" rx="20" fill="#12141a" stroke="#262a34"/>
    <text x="24" y="38" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="30" font-weight="900" fill="#a3e635">10% referral</text>
    <text x="24" y="70" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="15" fill="#9ca3af">Earn bonus points from users</text>
    <text x="24" y="92" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="15" fill="#9ca3af">who join through your link</text>
  </g>

  <g transform="translate(0 558)">
