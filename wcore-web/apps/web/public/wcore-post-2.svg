  <g opacity="0.045"><path d="M0 135H1200M0 270H1200M0 405H1200M0 540H1200" stroke="#84cc16"/><path d="M300 0V675M600 0V675M900 0V675" stroke="#84cc16"/></g>

  <g transform="translate(72 52)">
