<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070709"/>
      <stop offset="58%" stop-color="#0f1014"/>
      <stop offset="100%" stop-color="#171920"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a3e635"/>
      <stop offset="100%" stop-color="#84cc16"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#84cc16" stop-opacity="0.24"/>
      <stop offset="70%" stop-color="#84cc16" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#84cc16" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1010" cy="105" r="230" fill="url(#glow)"/>
  <circle cx="170" cy="575" r="210" fill="url(#glow)" opacity="0.5"/>

  <g opacity="0.045">
    <path d="M0 135H1200M0 270H1200M0 405H1200M0 540H1200" stroke="#84cc16"/>
    <path d="M300 0V675M600 0V675M900 0V675" stroke="#84cc16"/>
  </g>

  <g transform="translate(72 52)">
    <rect x="0" y="0" width="162" height="52" rx="26" fill="#12141a" stroke="#2b2f38"/>
    <image href="wcore-avatar.png" x="12" y="9" width="34" height="34"/>
    <text x="60" y="33" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="18" font-weight="900" fill="#f4f4f5" letter-spacing="0.8">WCORE</text>
  </g>

  <g transform="translate(74 154)" filter="url(#softShadow)">
    <rect x="0" y="0" width="124" height="124" rx="32" fill="#111319" stroke="#2b2f38"/>
    <circle cx="52" cy="50" r="34" fill="#0f1f12" stroke="#84cc16" stroke-width="5"/>
    <circle cx="41" cy="38" r="9" fill="#ffffff" opacity="0.1"/>
    <path d="M76 74l31 31" stroke="#84cc16" stroke-width="10" stroke-linecap="round"/>
    <path d="M30 53h13l7-16 10 31 8-20h15" fill="none" stroke="#a3e635" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(230 158)">
    <text x="0" y="0" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="62" font-weight="900" fill="url(#accent)" letter-spacing="-2.2">Your keys stay with you.</text>
    <text x="0" y="70" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="52" font-weight="850" fill="#f5f5f6" letter-spacing="-1.7">Scan any public address.</text>
    <text x="0" y="128" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="21" fill="#9ca3af">WCORE reads public blockchain data only. No wallet connection,</text>
    <text x="0" y="160" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="21" fill="#9ca3af">no private keys, no custody. Paste an address and get the full view.</text>
  </g>

  <g transform="translate(80 402)">
    <rect x="0" y="0" width="320" height="92" rx="18" fill="#12141a" stroke="#262a34"/>
    <text x="24" y="34" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#a3e635">116+ chains</text>
    <text x="24" y="62" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#9ca3af">EVM, Solana and Cosmos in one scan</text>
  </g>
  <g transform="translate(440 402)">
    <rect x="0" y="0" width="320" height="92" rx="18" fill="#12141a" stroke="#262a34"/>
    <text x="24" y="34" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#a3e635">view only</text>
    <text x="24" y="62" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#9ca3af">Reads balances, never controls funds</text>
  </g>
  <g transform="translate(800 402)">
    <rect x="0" y="0" width="320" height="92" rx="18" fill="#12141a" stroke="#262a34"/>
    <text x="24" y="34" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#a3e635">free to start</text>
    <text x="24" y="62" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" fill="#9ca3af">No signup required for public scans</text>
