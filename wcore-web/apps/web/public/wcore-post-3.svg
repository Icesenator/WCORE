    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#a3e635"/><stop offset="100%" stop-color="#84cc16"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#84cc16" stop-opacity="0.22"/><stop offset="100%" stop-color="#84cc16" stop-opacity="0"/></radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.42"/></filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="970" cy="120" r="260" fill="url(#glow)"/>
  <g opacity="0.045"><path d="M0 135H1200M0 270H1200M0 405H1200M0 540H1200" stroke="#84cc16"/><path d="M300 0V675M600 0V675M900 0V675" stroke="#84cc16"/></g>

  <g transform="translate(72 52)">
