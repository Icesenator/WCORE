<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050607"/>
      <stop offset="56%" stop-color="#0b1018"/>
      <stop offset="100%" stop-color="#071e2c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bef264"/>
      <stop offset="100%" stop-color="#84cc16"/>
    </linearGradient>
    <linearGradient id="ton" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="52%" stop-color="#0098ea"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101722"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
    <radialGradient id="glowTon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0098ea" stop-opacity="0.44"/>
      <stop offset="100%" stop-color="#0098ea" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowWcore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#84cc16" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#84cc16" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#000000" flood-opacity="0.46"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <clipPath id="tonLogoClip">
      <circle cx="254" cy="154" r="118"/>
    </clipPath>
    <style>
      .font { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .white { fill: #f5f5f6; }
      .muted { fill: #9ca3af; }
      .soft { fill: #d4d4d8; }
      .lime { fill: #a3e635; }
      .cyan { fill: #67e8f9; }
    </style>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="918" cy="300" r="390" fill="url(#glowTon)"/>
  <circle cx="118" cy="616" r="310" fill="url(#glowWcore)"/>
  <g opacity="0.055">
    <path d="M0 112H1200M0 225H1200M0 338H1200M0 451H1200M0 564H1200" stroke="#84cc16"/>
    <path d="M150 0V675M300 0V675M450 0V675M600 0V675M750 0V675M900 0V675M1050 0V675" stroke="#84cc16"/>
  </g>
  <path d="M-70 132C82 54 246 74 402 124C570 178 690 158 828 88C970 16 1088 52 1260 118" fill="none" stroke="#84cc16" stroke-opacity="0.13" stroke-width="2"/>
  <path d="M-60 540C120 470 246 500 402 552C556 604 718 598 856 520C998 446 1080 468 1240 548" fill="none" stroke="#0098ea" stroke-opacity="0.16" stroke-width="2"/>

  <g transform="translate(72 52)">
    <rect x="0" y="0" width="162" height="52" rx="26" fill="#12151b" stroke="#2c333f"/>
    <g transform="translate(12 9) scale(0.53125)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M32 8L54 20.5V45.5L32 58L10 45.5V20.5L32 8Z" stroke="#84cc16" stroke-width="4"/>
      <circle cx="32" cy="33" r="5" fill="#84cc16" stroke="none"/>
      <path d="M32 33L32 20M32 33L21 40M32 33L43 40" stroke="#84cc16" stroke-width="3"/>
      <circle cx="32" cy="20" r="3.5" fill="#84cc16" stroke="none"/>
      <circle cx="21" cy="40" r="3.5" fill="#84cc16" stroke="none"/>
      <circle cx="43" cy="40" r="3.5" fill="#84cc16" stroke="none"/>
      <path d="M32 20L32 8M21 40L10 46M43 40L54 46" stroke="#84cc16" stroke-opacity="0.6" stroke-width="2"/>
      <circle cx="32" cy="8" r="2.5" fill="#84cc16" fill-opacity="0.5" stroke="none"/>
      <circle cx="10" cy="46" r="2.5" fill="#84cc16" fill-opacity="0.5" stroke="none"/>
      <circle cx="54" cy="46" r="2.5" fill="#84cc16" fill-opacity="0.5" stroke="none"/>
    </g>
    <text x="60" y="33" class="font white" font-size="18" font-weight="900" letter-spacing="0.8">WCORE</text>
  </g>

  <g transform="translate(794 54)">
    <rect x="0" y="0" width="154" height="52" rx="26" fill="#12151b" stroke="#2c333f"/>
    <circle cx="28" cy="26" r="6" fill="#0098ea"/>
    <text x="50" y="32" class="font cyan" font-size="14" font-weight="950" letter-spacing="1.2">TON LIVE</text>
    <rect x="170" y="0" width="224" height="52" rx="26" fill="#12151b" stroke="#2c333f"/>
    <text x="282" y="32" text-anchor="middle" class="font white" font-size="14" font-weight="950" letter-spacing="0.8">170+ LIVE CHAINS</text>
  </g>

  <g transform="translate(72 174)">
    <text x="0" y="0" class="font white" font-size="70" font-weight="950" letter-spacing="-3.1">TON is now</text>
    <text x="0" y="72" class="font white" font-size="70" font-weight="950" letter-spacing="-3.1">on WCORE.</text>
    <text x="2" y="124" class="font muted" font-size="24" font-weight="720">Track Toncoin and TON tokens. Read-only.</text>
  </g>

  <g transform="translate(72 374)" filter="url(#shadow)">
    <rect x="0" y="0" width="492" height="174" rx="32" fill="url(#card)" stroke="#2b3442"/>
    <rect x="28" y="28" width="124" height="32" rx="16" fill="#06253a" stroke="#0e7490"/>
    <text x="90" y="49" text-anchor="middle" class="font cyan" font-size="13" font-weight="950" letter-spacing="1.1">NEW VM</text>
    <text x="28" y="92" class="font white" font-size="30" font-weight="950">EVM + Solana + Cosmos + TON</text>
    <text x="30" y="124" class="font muted" font-size="16" font-weight="720">One clean map for wallets spread across chains.</text>
    <g transform="translate(30 146)">
      <circle cx="5" cy="0" r="4" fill="#84cc16"/>
      <text x="20" y="5" class="font soft" font-size="15" font-weight="760">No custody. No signing. Just public wallet reads.</text>
    </g>
  </g>

  <g transform="translate(620 150)" filter="url(#shadow)">
    <rect x="0" y="0" width="508" height="426" rx="44" fill="#09101a" stroke="#244254"/>
    <rect x="1" y="1" width="506" height="424" rx="43" fill="none" stroke="#67e8f9" stroke-opacity="0.13"/>
    <circle cx="254" cy="154" r="124" fill="#06253a" filter="url(#softShadow)"/>
    <image href="chains/TON.png" x="136" y="36" width="236" height="236" clip-path="url(#tonLogoClip)" preserveAspectRatio="xMidYMid slice"/>
    <circle cx="254" cy="154" r="118" fill="none" stroke="#67e8f9" stroke-opacity="0.34" stroke-width="2"/>

    <text x="254" y="320" text-anchor="middle" class="font white" font-size="44" font-weight="950" letter-spacing="-1.1">Toncoin and tokens</text>
    <text x="254" y="354" text-anchor="middle" class="font muted" font-size="18" font-weight="720">Now visible next to the rest of your portfolio.</text>

    <g transform="translate(42 382)">
      <rect x="0" y="0" width="124" height="34" rx="17" fill="#111827" stroke="#334155"/>
      <text x="62" y="22" text-anchor="middle" class="font white" font-size="12" font-weight="900" letter-spacing="0.8">READ-ONLY</text>
      <rect x="144" y="0" width="98" height="34" rx="17" fill="#06253a" stroke="#0e7490"/>
      <text x="193" y="22" text-anchor="middle" class="font cyan" font-size="12" font-weight="900" letter-spacing="0.8">TON</text>
      <rect x="262" y="0" width="162" height="34" rx="17" fill="#172015" stroke="#34551f"/>
      <text x="343" y="22" text-anchor="middle" class="font lime" font-size="12" font-weight="900" letter-spacing="0.8">wcore.xyz</text>
    </g>
  </g>

  <g transform="translate(72 610)">
    <text x="0" y="0" class="font muted" font-size="16" font-weight="760">Paste a TON wallet. See it with your multichain balances.</text>
