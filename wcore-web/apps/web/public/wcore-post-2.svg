    <text x="24" y="31" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="17" font-weight="800" fill="#a3e635">smart cache</text>
    <text x="24" y="53" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" fill="#9ca3af">Fresh prices stay fast across scans</text>
