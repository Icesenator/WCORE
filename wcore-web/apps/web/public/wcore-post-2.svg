    <text x="0" y="70" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="52" font-weight="850" fill="#f5f5f6" letter-spacing="-1.7">Smart fallback per token.</text>
    <text x="0" y="128" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="21" fill="#9ca3af">WCORE checks DefiLlama, DexScreener, GeckoTerminal,</text>
