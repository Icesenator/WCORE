  <g transform="translate(0 565)">
    <text x="600" y="0" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" fill="#a3e635">wcore.xyz</text>
    <text x="600" y="34" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="15" fill="#71717a">read only portfolio tracking for 116+ chains</text>
