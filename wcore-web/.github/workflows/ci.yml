name: CI

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  typecheck-test-build:
    runs-on: ubuntu-latest
    env:
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      TEST_REDIS_URL: ${{ secrets.TEST_REDIS_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: node --check apps/api/set-test-env.js
      - run: pnpm --filter @wcore/db db:generate
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm --filter @wcore/core test
      - run: pnpm --filter @wcore/web test
      # API integration tests require TEST_DATABASE_URL + TEST_REDIS_URL (Railway test DB).
      # Auto-enabled when secrets are present; skipped silently otherwise.
      - name: API integration tests (gated on Railway test secrets)
        if: ${{ env.TEST_DATABASE_URL != '' && env.TEST_REDIS_URL != '' }}
        env:
          ALLOW_REMOTE_TEST_DB: "1"
        run: pnpm --filter @wcore/api test
      - run: pnpm build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail only on HIGH/CRITICAL prod-dep advisories (avoids dev noise).
      - name: pnpm audit (prod, high+)
        run: pnpm audit --prod --audit-level=high

      # Scan git history for leaked secrets.
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @wcore/db db:generate
      - run: pnpm --filter @wcore/shared build
      - run: pnpm --filter @wcore/core build
      - run: pnpm --filter @wcore/web build
      - run: pnpm --filter @wcore/web postbuild

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: E2E tests (critical flows)
        run: cd apps/web && npx playwright test --config=playwright.ci.config.ts e2e/critical-flows.spec.ts

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
