<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050607"/>
      <stop offset="0.54" stop-color="#0b1117"/>
      <stop offset="1" stop-color="#15210d"/>
    </linearGradient>
    <linearGradient id="lime" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#bef264"/>
      <stop offset="1" stop-color="#84cc16"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#84cc16" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#84cc16" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#a3e635" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#a3e635" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <style>
      .font { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .white { fill: #f5f5f6; }
      .muted { fill: #9ca3af; }
      .soft { fill: #d4d4d8; }
      .lime { fill: #a3e635; }
    </style>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="180" cy="100" r="370" fill="url(#glowA)"/>
  <circle cx="1020" cy="600" r="320" fill="url(#glow)" opacity="0.85"/>
  <g opacity="0.05" stroke="#84cc16">
    <path d="M0 112H1200M0 225H1200M0 338H1200M0 451H1200M0 564H1200"/>
    <path d="M150 0V675M300 0V675M450 0V675M600 0V675M750 0V675M900 0V675M1050 0V675"/>
  </g>
  <path d="M-70 132C82 54 246 74 402 124C570 178 690 158 828 88C970 16 1088 52 1260 118" fill="none" stroke="#84cc16" stroke-opacity="0.14" stroke-width="2"/>
  <path d="M-60 540C120 470 246 500 402 552C556 604 718 598 856 520C998 446 1080 468 1240 548" fill="none" stroke="#22c55e" stroke-opacity="0.10" stroke-width="2"/>

  <!-- Logo pill -->
  <g transform="translate(72 52)">
    <rect x="0" y="0" width="162" height="52" rx="26" fill="#12151b" stroke="#2c333f"/>
    <g transform="translate(12 9) scale(0.53125)" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M32 8L54 20.5V45.5L32 58L10 45.5V20.5L32 8Z" stroke="#84cc16" stroke-width="4"/>
      <circle cx="32" cy="33" r="5" fill="#84cc16" stroke="none"/>
      <path d="M32 33L32 20M32 33L21 40M32 33L43 40" stroke="#84cc16" stroke-width="3"/>
      <circle cx="32" cy="20" r="3.5" fill="#84cc16" stroke="none"/>
      <circle cx="21" cy="40" r="3.5" fill="#84cc16" stroke="none"/>
      <circle cx="43" cy="40" r="3.5" fill="#84cc16" stroke="none"/>
      <path d="M32 20L32 8M21 40L10 46M43 40L54 46" stroke="#84cc16" stroke-opacity="0.6" stroke-width="2"/>
      <circle cx="32" cy="8" r="2.5" fill="#84cc16" fill-opacity="0.5" stroke="none"/>
      <circle cx="10" cy="46" r="2.5" fill="#84cc16" fill-opacity="0.5" stroke="none"/>
      <circle cx="54" cy="46" r="2.5" fill="#84cc16" fill-opacity="0.5" stroke="none"/>
    </g>
    <text x="60" y="33" class="font white" font-size="18" font-weight="900" letter-spacing="0.8">WCORE</text>
  </g>

  <!-- Top-right stat pill -->
  <g transform="translate(866 52)">
    <rect x="0" y="0" width="262" height="52" rx="26" fill="#12151b" stroke="#2c333f"/>
    <text x="22" y="33" class="font white" font-size="18" font-weight="950" letter-spacing="0.5">7 CEX · 183 CHAINS</text>
    <circle cx="238" cy="26" r="5" fill="#84cc16"/>
  </g>

  <!-- Eyebrow -->
  <text x="72" y="168" class="font" font-size="13" font-weight="950" fill="#a3e635" letter-spacing="1.9">BEYOND CRYPTO</text>

  <!-- Headline -->
  <text x="72" y="236" class="font white" font-size="62" font-weight="950" letter-spacing="-2.4">Not just crypto.</text>
  <text x="72" y="300" class="font white" font-size="62" font-weight="950" letter-spacing="-2.4">Everything you own.</text>
  <text x="74" y="338" class="font muted" font-size="19" font-weight="650">On-chain wallets, 7 CEX, stocks &amp; commodities — priced live in one view.</text>

  <!-- Asset-class chips -->
  <g transform="translate(72 366)">
    <rect x="0" y="0" width="108" height="32" rx="16" fill="#0c1218" stroke="#34551f"/>
    <text x="54" y="21" text-anchor="middle" class="font lime" font-size="13" font-weight="950" letter-spacing="1.0">Crypto</text>
    <rect x="120" y="0" width="108" height="32" rx="16" fill="#0c1218" stroke="#2b3340"/>
    <text x="174" y="21" text-anchor="middle" class="font white" font-size="13" font-weight="800" letter-spacing="1.0">Stocks</text>
    <rect x="240" y="0" width="150" height="32" rx="16" fill="#0c1218" stroke="#2b3340"/>
    <text x="315" y="21" text-anchor="middle" class="font white" font-size="13" font-weight="800" letter-spacing="1.0">Commodities</text>
    <rect x="402" y="0" width="86" height="32" rx="16" fill="#0c1218" stroke="#2b3340"/>
    <text x="445" y="21" text-anchor="middle" class="font white" font-size="13" font-weight="800" letter-spacing="1.0">Fiat</text>
  </g>

  <!-- Hero card -->
  <g filter="url(#shadow)">
    <rect x="72" y="424" width="1056" height="164" rx="24" fill="#0d1117" stroke="#1a2332"/>
    <rect x="73" y="425" width="1054" height="162" rx="23" fill="none" stroke="#84cc16" stroke-opacity="0.12"/>

    <!-- Net worth tile -->
    <g transform="translate(104 452)">
      <text x="0" y="18" class="font muted" font-size="13" font-weight="700" letter-spacing="1.0">TOTAL NET WORTH</text>
      <text x="0" y="72" class="font" font-size="52" font-weight="950" letter-spacing="-1.6" fill="url(#lime)">$612,480</text>
      <text x="0" y="104" class="font soft" font-size="15" font-weight="650">crypto + stocks + commodities + fiat</text>
    </g>

    <!-- Divider -->
    <rect x="560" y="452" width="1.5" height="108" fill="#1e2836"/>

    <!-- Asset-class breakdown -->
    <g transform="translate(612 472)">
      <circle cx="6" cy="-5" r="5" fill="#a3e635"/>
      <text x="22" y="0" class="font white" font-size="16" font-weight="800">Crypto</text>
      <text x="22" y="22" class="font muted" font-size="13" font-weight="600">$410,200</text>

      <circle cx="256" cy="-5" r="5" fill="#22d3ee"/>
      <text x="272" y="0" class="font white" font-size="16" font-weight="800">Stocks</text>
      <text x="272" y="22" class="font muted" font-size="13" font-weight="600">$128,050</text>

      <circle cx="6" cy="59" r="5" fill="#facc15"/>
      <text x="22" y="64" class="font white" font-size="16" font-weight="800">Commodities</text>
      <text x="22" y="86" class="font muted" font-size="13" font-weight="600">$52,410</text>

      <circle cx="256" cy="59" r="5" fill="#d4d4d8"/>
      <text x="272" y="64" class="font white" font-size="16" font-weight="800">Fiat</text>
      <text x="272" y="86" class="font muted" font-size="13" font-weight="600">$21,820</text>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(72 626)">
    <text x="0" y="0" class="font muted" font-size="18" font-weight="700">Your whole net worth. One view.</text>
    <text x="1056" y="0" text-anchor="end" class="font" font-size="28" font-weight="950" fill="url(#lime)">wcore.xyz</text>
  </g>
  <rect x="0" y="671" width="1200" height="4" fill="url(#lime)" opacity="0.72"/>
</svg>
