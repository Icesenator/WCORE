      <text x="102" y="47" fill="#a3e635">DefiLlama</text><text x="255" y="47" fill="#52525b">then</text>
      <text x="410" y="47" fill="#a3e635">DexScreener</text><text x="565" y="47" fill="#52525b">then</text>
      <text x="725" y="47" fill="#a3e635">GeckoTerminal</text><text x="880" y="47" fill="#52525b">then</text>
      <text x="990" y="47" fill="#a3e635">Jupiter + CG</text>
    </g>
  </g>

  <g transform="translate(80 478)">
    <rect x="0" y="0" width="320" height="74" rx="18" fill="#12141a" stroke="#262a34"/>
    <text x="24" y="31" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="17" font-weight="800" fill="#a3e635">stablecoin fast path</text>
    <text x="24" y="53" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="13" fill="#9ca3af">FX conversion without wasting calls</text>
