services:
  postgres:
    image: postgres:16-alpine
    container_name: wcore-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-wcore}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-wcore}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - wcore_pg_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wcore}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wcore-prod

  redis:
    image: redis:7-alpine
    container_name: wcore-redis-prod
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - wcore_redis_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wcore-prod

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        NODE_ENV: production
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.your-domain.com}
        NEXT_PUBLIC_WC_PROJECT_ID: ${NEXT_PUBLIC_WC_PROJECT_ID}
    container_name: wcore-api-prod
    restart: unless-stopped
    environment:
      PORT: ${API_PORT:-4000}
      HOST: 0.0.0.0
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      DATABASE_URL: postgresql://${DB_USER:-wcore}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-wcore}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RATE_LIMIT_SCAN: ${RATE_LIMIT_SCAN:-60}
      RATE_LIMIT_AUTH: ${RATE_LIMIT_AUTH:-30}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      PUBLIC_URL: ${PUBLIC_URL:-https://your-domain.com}
    ports:
      - "${API_PORT:-4000}:${API_PORT:-4000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wcore-prod

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NODE_ENV: production
    container_name: wcore-web-prod
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.your-domain.com}
      NEXT_PUBLIC_WC_PROJECT_ID: ${NEXT_PUBLIC_WC_PROJECT_ID}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    networks:
      - wcore-prod

volumes:
  wcore_pg_prod:
  wcore_redis_prod:

networks:
  wcore-prod:
    driver: bridge
